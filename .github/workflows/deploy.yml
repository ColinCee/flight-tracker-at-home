name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run setup:frontend
      - run: bunx nx build frontend
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages deploy apps/frontend/dist --project-name=flight-tracker-at-home --branch=${{ github.head_ref || 'main' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-deploy
          message: |
            ## ✈️ Preview Deployment

            | | |
            |---|---|
            | **Latest commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Status** | ✅ Deploy successful! |
            | **Preview URL** | ${{ steps.deploy.outputs.deployment-url || 'https://flight-tracker-at-home.pages.dev' }} |
            | **Branch** | `${{ github.head_ref }}` |

            > Deployed to [Cloudflare Pages](https://pages.dev) via GitHub Actions
