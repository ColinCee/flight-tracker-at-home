name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend (Pages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise run setup:frontend
      - run: bunx nx build frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.80.0"
          command: pages deploy apps/frontend/dist --project-name=flight-tracker-at-home --branch=${{ github.head_ref || 'main' }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-deploy
          message: |
            ## ✈️ Preview Deployment

            | | |
            |---|---|
            | **Latest commit** | `${{ github.event.pull_request.head.sha }}` |
            | **Status** | ✅ Deploy successful! |
            | **Preview URL** | ${{ steps.deploy.outputs.deployment-url || 'https://flight-tracker-at-home.pages.dev' }} |
            | **Branch** | `${{ github.head_ref }}` |

            > Deployed to [Cloudflare Pages](https://pages.dev) via GitHub Actions

  deploy-backend:
    name: Deploy Backend (Dokploy)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger Dokploy deploy
        run: |
          curl -sf -X POST 'http://beelink:3000/api/trpc/application.deploy' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_KEY }}' \
            -H 'Content-Type: application/json' \
            -d '{"json":{"applicationId":"lY6Mu4-AFWeasm-SMoJG0"}}'
          echo "✅ Backend deploy triggered on Dokploy"
