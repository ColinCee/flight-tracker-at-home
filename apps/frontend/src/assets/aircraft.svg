<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Modelled after Airbus A320 top-down proportions:
    - Wingspan/length ≈ 0.95 (nearly square)
    - Engines at ~30% half-span from fuselage
    - Horizontal stab span ≈ 1/3 of wingspan
    - 25° wing sweep
  -->
  <!-- Fuselage (length 58, width 6) -->
  <path d="M32 2 C30.2 2 29 6 29 10 L29 56 C29 59 30.5 61 32 61 C33.5 61 35 59 35 56 L35 10 C35 6 33.8 2 32 2Z" fill="currentColor"/>
  <!-- Left wing -->
  <path d="M29 23 L5 33 L7 35 L29 32Z" fill="currentColor"/>
  <!-- Right wing -->
  <path d="M35 23 L59 33 L57 35 L35 32Z" fill="currentColor"/>
  <!-- Left engine nacelle (~30% half-span) -->
  <ellipse cx="21.5" cy="28" rx="1.6" ry="3.5" fill="currentColor"/>
  <!-- Right engine nacelle -->
  <ellipse cx="42.5" cy="28" rx="1.6" ry="3.5" fill="currentColor"/>
  <!-- Left horizontal stabilizer (1/3 of wingspan) -->
  <path d="M29 52 L22 57 L23 58 L29 55Z" fill="currentColor"/>
  <!-- Right horizontal stabilizer -->
  <path d="M35 52 L42 57 L41 58 L35 55Z" fill="currentColor"/>
  <!-- Dorsal fin -->
  <path d="M31.2 53 L32 48 L32.8 53Z" fill="currentColor" opacity="0.45"/>
</svg>
