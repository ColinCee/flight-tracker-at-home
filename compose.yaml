# Flight Tracker Docker Compose
#
# Production (Dokploy):
#   Dokploy deploys this as a Compose service, pulling from GitHub.
#   Config is in this file — Dokploy is just the runner.
#   See docs/SELF-HOST.md for setup details.
#
# Local development:
#   docker compose --profile dev up
#   Builds and runs the backend locally on port 8000

services:
  # --- Production services (deployed by Dokploy) ---
  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - heatmap_data:/app/data
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-https://flight-tracker-at-home.pages.dev}
      - CACHE_TTL=${CACHE_TTL:-10}
      - HEATMAP_DB_PATH=/app/data/historical_heatmap.parquet
    profiles: [prod]

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run --token ${TUNNEL_TOKEN:?Set TUNNEL_TOKEN env var}
    depends_on:
      - backend
    profiles: [prod]

  # --- Local development ---
  backend-dev:
    build:
      context: apps/backend
    ports:
      - "8000:8000"
    env_file:
      - apps/backend/.env
    profiles: [dev]

  frontend-dev:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      BACKEND_URL: backend-dev:8000
    depends_on:
      - backend-dev
    profiles: [dev]

volumes:
  heatmap_data:
