# Flight Tracker Docker Compose
#
# Production (self-hosted server):
#   docker compose --profile prod up -d
#   Runs backend (from GHCR) + Cloudflare Tunnel + Tugtainer auto-updater
#   Setup: see docs/SELF-HOST.md
#
# Local development:
#   docker compose --profile dev up
#   Builds and runs the backend locally on port 8000

services:
  # --- Production services ---
  backend:
    image: ghcr.io/colincee/flight-tracker-at-home/backend:latest
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    labels:
      - "tugtainer.enable=true"
    profiles: [prod]

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - backend
    profiles: [prod]

  tugtainer:
    image: ghcr.io/tugtainer/tugtainer:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/London
    profiles: [prod]

  # --- Local development ---
  backend-dev:
    build:
      context: apps/backend
    ports:
      - "8000:8000"
    env_file:
      - apps/backend/.env
    profiles: [dev]

  frontend-dev:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      BACKEND_URL: backend-dev:8000
    depends_on:
      - backend-dev
    profiles: [dev]
