[tools]
bun = "1.3"
node = "24"
python = "3.12"
uv = "latest"

[settings]
python.uv_venv_auto = true

[env]
VIRTUAL_ENV = "{{config_root}}/apps/backend/.venv"

[tasks.setup]
description = "Install all dependencies (JS + Python)"
run = """
bun install
cd apps/backend && uv sync
"""

[tasks.dev]
description = "Run frontend and backend together"
run = "bun run dev"

[tasks."setup:frontend"]
description = "Install frontend dependencies only"
run = "bun install"

[tasks."setup:backend"]
description = "Install backend dependencies only"
run = "cd apps/backend && uv sync"

[tasks.format]
description = "Format all code (ruff + biome)"
run = """
uvx ruff format apps/backend/
uvx ruff check --fix apps/backend/
bunx @biomejs/biome format --write .
bunx @biomejs/biome lint --fix .
"""

[tasks.check]
description = "Lint, format, and type check (no modifications)"
run = """
uvx ruff check apps/backend/
uvx ruff format --check apps/backend/
bunx @biomejs/biome check .
cd apps/backend && uvx ty check
cd -
bunx tsc --build
"""

[tasks.test]
description = "Run all tests"
run = """
cd apps/backend && uv run pytest
"""

[tasks.typecheck]
description = "Type check all code (subset of check)"
run = """
cd apps/backend && uvx ty check
cd -
bunx tsc --build
"""

[tasks."rules:sync"]
description = "Regenerate AI config files from .rulesync/"
run = "npx rulesync generate"

[tasks."rules:check"]
description = "Check AI config files are in sync with .rulesync/"
run = """
npx rulesync generate
if ! git diff --quiet; then
  echo "ERROR: AI config files are out of sync with .rulesync/"
  echo "Run: mise run rules:sync"
  git diff --stat
  exit 1
fi
echo "AI config files are in sync"
"""
