[tools]
bun = "1.3"
node = "22"
python = "3.12"
uv = "latest"

[settings]
python.uv_venv_auto = true

[env]
VIRTUAL_ENV = "{{config_root}}/apps/backend/.venv"

[tasks.setup]
description = "Install all dependencies (JS + Python)"
run = """
bun install
cd apps/backend && uv sync
"""

[tasks."setup:frontend"]
description = "Install frontend dependencies only"
run = "bun install"

[tasks."setup:backend"]
description = "Install backend dependencies only"
run = "cd apps/backend && uv sync"

[tasks.format]
description = "Format all code (ruff + prettier)"
run = """
uvx ruff format apps/backend/
uvx ruff check --fix apps/backend/
bunx prettier --write .
"""

[tasks.check]
description = "Lint and format check (no modifications)"
run = """
uvx ruff check apps/backend/
uvx ruff format --check apps/backend/
cd apps/backend && uvx ty check
cd -
bunx prettier --check .
"""

[tasks.typecheck]
description = "Type check all code"
run = """
cd apps/backend && uvx ty check
cd -
bunx tsc --build
"""
