services:
  - type: web
    name: flight-tracker-at-home
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run --no-dev uvicorn src.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://flight-tracker-at-home.pages.dev
      - key: CACHE_TTL
        value: "20"
      - key: OPENSKY_PROXY_URL
        sync: false # set manually in Render dashboard
      - key: OPENSKY_PROXY_KEY
        sync: false # set manually in Render dashboard
